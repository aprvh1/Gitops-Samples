pipeline:
  projectIdentifier: akshitprojectqa
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Dev Deploy
        identifier: Dev_Deploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          service:
            serviceRef: loansapi
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  manifests:
                    - manifest:
                        identifier: manifests
                        type: ReleaseRepo
                        spec:
                          store:
                            type: Github
                            spec:
                              paths: <+input>
          execution:
            steps:
              - parallel:
                  - step:
                      type: GitOpsUpdateReleaseRepo
                      name: Modify Git
                      identifier: Modify_Git
                      timeout: 10m
                      spec:
                        variables:
                          - name: replicas[0].count
                            type: String
                            value: <+pipeline.variables.replica>
                        prTitle: Update Replica Count
                        allowEmptyCommit: true
                  - step:
                      type: JiraCreate
                      name: JiraCreate
                      identifier: JiraCreate
                      spec:
                        connectorRef: seenvjiratemp
                        projectKey: HD
                        issueType: Story
                        fields:
                          - name: Description
                            value: "Promote <+service.name> to production \\\\ Pipeline Name: <+pipeline.name> \\\\ Artifact: <+artifact.image> \\\\ Deployment URL: <+pipeline.executionUrl> \\\\ Requested by <+pipeline.triggeredBy.name>"
                          - name: Summary
                            value: Tracking GitOps Deployment
                      timeout: 10m
              - step:
                  type: MergePR
                  name: Approve Git Changes
                  identifier: Approve_Git_Changes
                  spec:
                    deleteSourceBranch: true
                    variables: []
                  timeout: 10m
              - parallel:
                  - step:
                      type: GitOpsSync
                      name: ArgoCD Sync
                      identifier: GitOps_Sync
                      spec:
                        prune: false
                        dryRun: false
                        applyOnly: false
                        forceApply: false
                        applicationsList:
                          - applicationName: dev-loans-api
                            agentId: devgitopsdemo
                        retryStrategy: {}
                        retry: false
                        syncOptions:
                          skipSchemaValidation: false
                          autoCreateNamespace: false
                          pruneResourcesAtLast: false
                          applyOutOfSyncOnly: false
                          replaceResources: false
                          prunePropagationPolicy: foreground
                          respectIgnoreDifferences: false
                          serverSideApply: false
                        autoPromoteRolloutBehavior: promote-full
                      timeout: 10m
                  - step:
                      type: JiraUpdate
                      name: JiraUpdate - Dev
                      identifier: JiraUpdate_1
                      spec:
                        connectorRef: seenvjiratemp
                        issueKey: <+pipeline.stages.Dev_Deploy.spec.execution.steps.JiraCreate.issue.key>
                        fields:
                          - name: Comment
                            value: "Dev-Only: Updated GitRepo, Deployed via ArgoCD"
                        issueType: Story
                        projectKey: HD
                      timeout: 10m
            rollbackSteps:
              - step:
                  type: RevertPR
                  name: Revert PR
                  identifier: Revert_PR
                  spec:
                    commitId: <+pipeline.stages.Dev_Deploy.spec.execution.steps.updateReleaseRepo.updateReleaseRepoOutcome.commitId>
                  timeout: 10m
              - parallel:
                  - step:
                      type: GitOpsSync
                      name: Rollback - Sync
                      identifier: Rollback_Sync
                      spec:
                        prune: false
                        dryRun: false
                        applyOnly: false
                        forceApply: false
                        applicationsList:
                          - applicationName: dev-loans-api
                            agentId: devgitopsdemo
                        retryStrategy: {}
                        retry: false
                        syncOptions:
                          skipSchemaValidation: false
                          autoCreateNamespace: false
                          pruneResourcesAtLast: false
                          applyOutOfSyncOnly: false
                          replaceResources: false
                          prunePropagationPolicy: foreground
                          respectIgnoreDifferences: false
                          serverSideApply: false
                      timeout: 10m
                  - step:
                      type: JiraUpdate
                      name: JiraUpdate - Rollback
                      identifier: JiraUpdate_1
                      spec:
                        connectorRef: seenvjiratemp
                        issueKey: <+pipeline.stages.Dev_Deploy.spec.execution.steps.JiraCreate.issue.key>
                        fields:
                          - name: Comment
                            value: "Dev-Only: Rollback PR, Sync via ArgoCD"
                        issueType: Story
                        projectKey: HD
                      timeout: 10m
          environment:
            environmentRef: Dev_GitOps_Product_Demo
            deployToAll: false
            gitOpsClusters:
              - identifier: incluster
                agentIdentifier: devgitopsdemo
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
    - stage:
        name: QA Deploy
        identifier: QA_Deploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          service:
            serviceRef: loansapi
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  manifests:
                    - manifest:
                        identifier: manifests
                        type: ReleaseRepo
                        spec:
                          store:
                            type: Github
                            spec:
                              paths: <+input>
          execution:
            steps:
              - step:
                  type: GitOpsUpdateReleaseRepo
                  name: Modify Git
                  identifier: Create_PR
                  spec:
                    variables:
                      - name: replicas[0].count
                        type: String
                        value: <+pipeline.variables.replica>
                    allowEmptyCommit: true
                  timeout: 10m
              - step:
                  type: MergePR
                  name: Approve Git Changes
                  identifier: Merge_PR
                  spec:
                    deleteSourceBranch: false
                    variables: []
                  timeout: 10m
              - parallel:
                  - step:
                      type: GitOpsSync
                      name: ArgoCD Sync
                      identifier: GitOpsSync_1
                      spec:
                        prune: false
                        dryRun: false
                        applyOnly: false
                        forceApply: false
                        applicationsList:
                          - applicationName: qa-loans-api
                            agentId: qagitopsdemo
                        retryStrategy: {}
                        retry: false
                        syncOptions:
                          skipSchemaValidation: false
                          autoCreateNamespace: false
                          pruneResourcesAtLast: false
                          applyOutOfSyncOnly: false
                          replaceResources: false
                          prunePropagationPolicy: foreground
                          respectIgnoreDifferences: false
                          serverSideApply: false
                        autoPromoteRolloutBehavior: promote-full
                      timeout: 10m
                  - step:
                      type: JiraUpdate
                      name: JiraUpdate - QA
                      identifier: JiraUpdate_QA
                      spec:
                        connectorRef: seenvjiratemp
                        issueKey: <+pipeline.stages.Dev_Deploy.spec.execution.steps.JiraCreate.issue.key>
                        fields:
                          - name: Comment
                            value: "QA-Only: Updated GitRepo, Deployed via ArgoCD"
                        issueType: Story
                        projectKey: HD
                      timeout: 10m
            rollbackSteps: []
          environment:
            environmentRef: QA_GitOps_Product_Demo
            deployToAll: false
            gitOpsClusters:
              - identifier: incluster
                agentIdentifier: qagitopsdemo
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
    - stage:
        name: Prod Approval Gate
        identifier: Approve_Prod_NA_Deploy
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Approve Prod
                  identifier: Approve_Prod_NA
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: Please Approve Prod NA Deploy
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                    isAutoRejectEnabled: false
                    approverInputs: []
        tags: {}
    - stage:
        name: Prod-NA Deploy
        identifier: Prod_NA_Deploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          service:
            serviceRef: loansapi
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  manifests:
                    - manifest:
                        identifier: manifests
                        type: ReleaseRepo
                        spec:
                          store:
                            type: Github
                            spec:
                              paths: <+input>
          execution:
            steps:
              - step:
                  type: GitOpsUpdateReleaseRepo
                  name: Modify Git
                  identifier: Create_PR
                  spec:
                    variables:
                      - name: spec.replicas
                        type: String
                        value: <+pipeline.variables.replica>
                      - name: spec.template.spec.containers[0].image
                        type: String
                        value: <+input>
                    allowEmptyCommit: true
                  timeout: 10m
              - step:
                  type: MergePR
                  name: Approve Git Changes
                  identifier: Merge_PR
                  spec:
                    deleteSourceBranch: false
                    variables: []
                  timeout: 10m
              - parallel:
                  - step:
                      type: GitOpsSync
                      name: ArgoCD Sync
                      identifier: GitOps_Sync
                      spec:
                        prune: false
                        dryRun: false
                        applyOnly: false
                        forceApply: false
                        applicationsList:
                          - applicationName: prod-na-loans-api
                            agentId: prodnagitopsdemo
                        retryStrategy: {}
                        retry: false
                        syncOptions:
                          skipSchemaValidation: false
                          autoCreateNamespace: false
                          pruneResourcesAtLast: false
                          applyOutOfSyncOnly: false
                          replaceResources: false
                          prunePropagationPolicy: foreground
                          respectIgnoreDifferences: false
                          serverSideApply: false
                      timeout: 10m
                  - step:
                      type: JiraUpdate
                      name: JiraUpdate - ProdNA
                      identifier: JiraUpdate_ProdNA
                      spec:
                        connectorRef: seenvjiratemp
                        issueKey: <+pipeline.stages.Dev_Deploy.spec.execution.steps.JiraCreate.issue.key>
                        fields:
                          - name: Comment
                            value: "ProdNA-Only: Updated GitRepo, Deployed via ArgoCD"
                        issueType: Story
                        projectKey: HD
                      timeout: 10m
              - step:
                  type: GitOpsRollout
                  name: ArgoRollout  Canary 25
                  identifier: ArgoRollout_Canary_25
                  spec:
                    agentIdentifier: prodnagitopsdemo
                    namespace: loans
                    appName: prod-na-loans-api
                    rolloutName: loans-api
                    waitUntilHealthStatus:
                      healthStatus: Suspended
                  timeout: 10m
              - parallel:
                  - step:
                      type: Verify
                      name: Verify_1
                      identifier: Verify_1
                      spec:
                        isMultiServicesOrEnvs: false
                        type: Canary
                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: HIGH
                          duration: 5m
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
                    contextType: Pipeline
                  - step:
                      type: GitOpsRollout
                      name: Wait
                      identifier: Wait_until_Suspended
                      spec:
                        appName: <+execution.steps.Parse_Rollout_Step.spec.appName>
                        agentIdentifier: <+execution.steps.Parse_Rollout_Step.spec.agentIdentifier>
                        namespace: <+execution.steps.Parse_Rollout_Step.spec.namespace>
                        rolloutName: <+execution.steps.Parse_Rollout_Step.spec.rolloutName>
                        waitUntilHealthStatus:
                          healthStatus: Suspended
                          healthMessage: CanaryPauseStep
                      timeout: 10m
                    contextType: Pipeline
              - step:
                  type: GitOpsRollout
                  name: ArgoRollout Canary 50
                  identifier: Resume_Rollout
                  spec:
                    appName: <+execution.steps.Wait_until_Suspended.spec.appName>
                    agentIdentifier: <+execution.steps.Wait_until_Suspended.spec.agentIdentifier>
                    namespace: <+execution.steps.Wait_until_Suspended.spec.namespace>
                    rolloutName: <+execution.steps.Wait_until_Suspended.spec.rolloutName>
                  timeout: 10m
              - parallel:
                  - step:
                      type: Verify
                      name: Verify_2
                      identifier: Verify_2
                      spec:
                        isMultiServicesOrEnvs: false
                        type: Canary
                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: MEDIUM
                          duration: 5m
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
                  - step:
                      type: GitOpsRollout
                      name: Wait
                      identifier: Wait_until_Suspended_2
                      spec:
                        appName: <+execution.steps.Parse_Rollout_Step.spec.appName>
                        agentIdentifier: <+execution.steps.Parse_Rollout_Step.spec.agentIdentifier>
                        namespace: <+execution.steps.Parse_Rollout_Step.spec.namespace>
                        rolloutName: <+execution.steps.Parse_Rollout_Step.spec.rolloutName>
                        waitUntilHealthStatus:
                          healthStatus: Suspended
                          healthMessage: CanaryPauseStep
                      timeout: 10m
              - step:
                  type: GitOpsRollout
                  name: ArgoRollout Canary 75
                  identifier: Resume_Rollout_2
                  spec:
                    appName: <+execution.steps.Parse_Rollout_Step.spec.appName>
                    agentIdentifier: <+execution.steps.Parse_Rollout_Step.spec.agentIdentifier>
                    namespace: <+execution.steps.Parse_Rollout_Step.spec.namespace>
                    rolloutName: <+execution.steps.Parse_Rollout_Step.spec.rolloutName>
                  timeout: 10m
              - step:
                  type: Verify
                  name: Verify_3
                  identifier: Verify_3
                  spec:
                    isMultiServicesOrEnvs: false
                    type: Canary
                    monitoredService:
                      type: Default
                      spec: {}
                    spec:
                      sensitivity: HIGH
                      duration: 5m
                  timeout: 2h
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Verification
                        action:
                          type: ManualIntervention
                          spec:
                            timeout: 2h
                            onTimeout:
                              action:
                                type: StageRollback
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: ManualIntervention
                          spec:
                            timeout: 2h
                            onTimeout:
                              action:
                                type: Ignore
              - step:
                  type: GitOpsRollout
                  name: ArgoRollout Canary 100
                  identifier: Resume_Rollout_3
                  spec:
                    appName: <+execution.steps.Parse_Rollout_Step.spec.appName>
                    agentIdentifier: <+execution.steps.Parse_Rollout_Step.spec.agentIdentifier>
                    namespace: <+execution.steps.Parse_Rollout_Step.spec.namespace>
                    rolloutName: <+execution.steps.Parse_Rollout_Step.spec.rolloutName>
                  timeout: 10m
            rollbackSteps:
              - step:
                  type: GitOpsRollout
                  name: ArgoRollout Abort
                  identifier: ArgoRollout_Abort
                  spec:
                    appName: <+execution.steps.Parse_Rollout_Step.spec.appName>
                    agentIdentifier: <+execution.steps.Wait_until_Suspended.spec.agentIdentifier>
                    namespace: <+execution.steps.Parse_Rollout_Step.spec.namespace>
                    rolloutName: <+execution.steps.Parse_Rollout_Step.spec.rolloutName>
                    autoRolloutAction: abort
                    waitUntilHealthStatus:
                      healthStatus: Unknown
                      healthMessage: Aborting
                  timeout: 10m
              - step:
                  type: RevertPR
                  name: Undo Git Changes
                  identifier: Undo_Git_Changes
                  spec:
                    commitId: <+revert>
                  timeout: 10m
              - step:
                  type: GitOpsSync
                  name: ArgoCD Sync
                  identifier: ArgoCD_Sync
                  spec:
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    applicationsList: []
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
                  timeout: 10m
          environment:
            environmentRef: Prod_NA_GitOps_Product_Demo
            deployToAll: false
            gitOpsClusters:
              - identifier: incluster
                agentIdentifier: prodnagitopsdemo
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        gitOpsEnabled: true
    - stage:
        name: HighReg Approval Gate
        identifier: HighReg_Approval_Gate
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Approval Gate
                  identifier: Approval_Gate
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Please review the following information
                      and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                    isAutoRejectEnabled: false
                    approverInputs: []
        tags: {}
    - stage:
        name: Prod-HighReg Deploy
        identifier: Preprod_Deploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          service:
            serviceRef: loansapi
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  manifests:
                    - manifest:
                        identifier: manifests
                        type: ReleaseRepo
                        spec:
                          store:
                            type: Github
                            spec:
                              paths: <+input>
          execution:
            steps:
              - parallel:
                  - step:
                      type: GitOpsSync
                      name: GitOps Sync
                      identifier: GitOps_Sync
                      spec:
                        prune: false
                        dryRun: false
                        applyOnly: false
                        forceApply: false
                        applicationsList:
                          - applicationName: preprod-loans-api
                            agentId: preprodgitopsdemo
                        retryStrategy: {}
                        retry: false
                        syncOptions:
                          skipSchemaValidation: false
                          autoCreateNamespace: false
                          pruneResourcesAtLast: false
                          applyOutOfSyncOnly: false
                          replaceResources: false
                          prunePropagationPolicy: foreground
                          respectIgnoreDifferences: false
                          serverSideApply: false
                        autoPromoteRolloutBehavior: promote-full
                      timeout: 10m
                  - step:
                      type: JiraUpdate
                      name: JiraUpdate - PreProd
                      identifier: JiraUpdate_PreProd
                      spec:
                        connectorRef: seenvjiratemp
                        issueKey: <+pipeline.stages.Dev_Deploy.spec.execution.steps.JiraCreate.issue.key>
                        fields:
                          - name: Comment
                            value: "PreProd-Only: Updated GitRepo, Deployed via ArgoCD"
                        issueType: Story
                        projectKey: HD
                      timeout: 10m
            rollbackSteps: []
          environment:
            environmentRef: Preprod_GitOps_Product_Demo
            deployToAll: false
            gitOpsClusters:
              - identifier: incluster
                agentIdentifier: preprodgitopsdemo
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        gitOpsEnabled: true
  allowStageExecutions: true
  identifier: pipeloansapi_Clone
  name: pipe-loans-api - Clone
  variables:
    - name: replica
      type: Number
      description: ""
      required: false
      value: <+input>